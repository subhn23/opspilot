<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Enrollment | OpsPilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-indigo-600 px-8 py-6 text-white text-center">
            <h1 class="text-2xl font-bold">Secure Your Account</h1>
            <p class="text-indigo-100 mt-1">Multi-Factor Authentication Setup</p>
        </div>
        
        <div class="p-8">
            <div class="mb-8 text-center">
                <p class="text-slate-600 mb-6">Scan this QR code with your authenticator app (Google Authenticator, Authy, etc.) to enroll.</p>
                
                <div class="inline-block p-4 bg-white border-2 border-slate-100 rounded-xl mb-4">
                    <!-- QR Code Placeholder: In production, this will be an image tag with base64 data -->
                    <img src="{{ .QRCode }}" alt="MFA QR Code" class="w-48 h-48 mx-auto">
                </div>
                
                <div class="mt-2">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Manual Secret</p>
                    <code class="px-3 py-1 bg-slate-100 rounded text-indigo-600 font-mono text-sm">{{ .Secret }}</code>
                </div>
            </div>

            <form hx-post="/auth/mfa/verify" hx-target="#verify-status" class="space-y-4">
                <div>
                    <label for="passcode" class="block text-sm font-medium text-slate-700 mb-1">Verification Code</label>
                    <input type="text" name="passcode" id="passcode" placeholder="000000" maxlength="6" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-2xl tracking-[0.5em] font-mono">
                </div>
                
                <div id="verify-status"></div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg shadow-indigo-200">
                    Verify & Complete Setup
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <a href="/" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors">Skip for now (not recommended)</a>
            </div>
        </div>
    </div>
</body>
</html>
