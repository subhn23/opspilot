<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Enrollment | OpsPilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900" x-data="{ sidebarOpen: false }">
    <div class="flex h-screen overflow-hidden">
        
        <!-- Mobile Sidebar Overlay -->
        <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 z-20 bg-black bg-opacity-50 lg:hidden"></div>

        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-white transition-transform duration-300 transform lg:translate-x-0 lg:static lg:inset-0">
            <div class="flex items-center justify-center h-16 bg-indigo-600">
                <span class="text-xl font-bold uppercase tracking-wider">OpsPilot</span>
            </div>
            <nav class="mt-4 px-4 space-y-2">
                <a href="/" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Dashboard</span>
                </a>
                <a href="/environments/new" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Provision VM</span>
                </a>
                <a href="/audit" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Audit Logs</span>
                </a>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Infrastructure Map</span>
                </a>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Deployments</span>
                </a>
                <a href="/auth/mfa/enroll" class="flex items-center p-3 rounded-lg bg-indigo-500 bg-opacity-25 border-l-4 border-indigo-500">
                    <span class="ml-3">MFA Enrollment</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-8">
                <button @click="sidebarOpen = true" class="p-2 rounded-md lg:hidden text-slate-600 hover:bg-slate-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-8 flex items-center justify-center">
                <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <div class="bg-indigo-600 px-8 py-6 text-white text-center">
                        <h1 class="text-2xl font-bold">Secure Your Account</h1>
                        <p class="text-indigo-100 mt-1">Multi-Factor Authentication Setup</p>
                    </div>
                    
                    <div class="p-8">
                        <div class="mb-8 text-center">
                            <p class="text-slate-600 mb-6">Scan this QR code with your authenticator app (Google Authenticator, Authy, etc.) to enroll.</p>
                            
                            <div class="inline-block p-4 bg-white border-2 border-slate-100 rounded-xl mb-4">
                                <!-- QR Code Placeholder -->
                                <img src="{{ .QRCode }}" alt="MFA QR Code" class="w-48 h-48 mx-auto">
                            </div>
                            
                            <div class="mt-2">
                                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Manual Secret</p>
                                <code class="px-3 py-1 bg-slate-100 rounded text-indigo-600 font-mono text-sm">{{ .Secret }}</code>
                            </div>
                        </div>

                        <form hx-post="/auth/mfa/verify" hx-target="#verify-status" class="space-y-4">
                            <div>
                                <label for="passcode" class="block text-sm font-medium text-slate-700 mb-1">Verification Code</label>
                                <input type="text" name="passcode" id="passcode" placeholder="000000" maxlength="6" required
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-2xl tracking-[0.5em] font-mono">
                            </div>
                            
                            <div id="verify-status"></div>

                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg shadow-indigo-200">
                                Verify & Complete Setup
                            </button>
                        </form>

                        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                            <a href="/" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors">Skip for now (not recommended)</a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
