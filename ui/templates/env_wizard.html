<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provision Environment | OpsPilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900" x-data="{ sidebarOpen: false }">
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-white transition-transform duration-300 transform lg:translate-x-0 lg:static lg:inset-0">
            <div class="flex items-center justify-center h-16 bg-indigo-600">
                <span class="text-xl font-bold uppercase tracking-wider">OpsPilot</span>
            </div>
            <nav class="mt-4 px-4 space-y-2">
                <a href="/" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Dashboard</span>
                </a>
                <a href="/environments/new" class="flex items-center p-3 rounded-lg bg-indigo-500 bg-opacity-25 border-l-4 border-indigo-500">
                    <span class="ml-3">Provision VM</span>
                </a>
                <a href="/audit" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Audit Logs</span>
                </a>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Infrastructure Map</span>
                </a>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">Deployments</span>
                </a>
                <a href="/auth/mfa/enroll" class="flex items-center p-3 rounded-lg hover:bg-slate-800 transition-colors">
                    <span class="ml-3">MFA Enrollment</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-8">
                <button @click="sidebarOpen = true" class="p-2 rounded-md lg:hidden text-slate-600 hover:bg-slate-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <div class="text-sm font-medium text-slate-500 uppercase tracking-tight">Provisioning Wizard</div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 lg:p-8 flex justify-center">
                <div class="max-w-2xl w-full">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-slate-800">Provision New Environment</h1>
                        <p class="text-slate-500">Deploy an isolated VM on Proxmox for your application.</p>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                        <form hx-post="/api/environments" hx-target="#wizard-status" hx-indicator="#loading-spinner" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Environment Name</label>
                                    <input type="text" name="name" placeholder="e.g. auth-staging" required
                                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Environment Type</label>
                                    <select name="type" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                                        <option value="dev">Development</option>
                                        <option value="staging">Staging</option>
                                        <option value="testing">Testing</option>
                                        <option value="prod">Production</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Host Node</label>
                                    <select name="host_node" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                                        <option value="host1">Host 1 (Primary)</option>
                                        <option value="host2">Host 2 (Standby)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">CPU Cores</label>
                                    <input type="number" name="cpu" value="2" min="1" max="8"
                                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Memory (MB)</label>
                                <input type="number" name="memory" value="2048" min="512" step="512"
                                    class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            </div>

                            <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition-all flex items-center">
                                    <span id="btn-text">Initialize Provisioning</span>
                                    <svg id="loading-spinner" class="animate-spin ml-3 h-5 w-5 text-white htmx-indicator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                </button>
                                <span class="text-xs text-slate-400 italic italic">Terraform will be initialized upon submission.</span>
                            </div>

                            <div id="wizard-status"></div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
